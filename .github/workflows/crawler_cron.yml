name: AdvPlus Crawler Automático

on:
  schedule:
    # Roda diariamente às 06:30 AM (Horário de Brasília / 09:30 UTC)
    - cron: '30 9 * * *'
  workflow_dispatch: # Permite rodar manualmente pelo painel do GitHub se necessário

jobs:
  run-crawler:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Código
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar Dependências do Crawler
        run: |
          cd crawler
          npm install

      - name: Instalar Playwright Browsers
        run: |
          cd crawler
          npx playwright install chromium --with-deps

      - name: Executar Crawler
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          cd crawler
          node index.js
